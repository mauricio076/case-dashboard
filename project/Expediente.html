<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Expediente</title>

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,400;0,9..144,500;0,9..144,600;1,9..144,400&family=Inter:wght@300;400;500;600&family=Barlow+Condensed:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />

  <!-- Lucide icons (SVG-based, no font files needed) -->
  <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>

  <style>
    /* ── QS Studio Design Tokens ───────────────────────────────────────── */
    :root {
      /* Core palette */
      --ink-1000: #1F1F1E;
      --ink-900:  #1C2B2B;
      --ink-800:  #2A3A3A;
      --ink-700:  #4A5656;
      --ink-600:  #6E7676;
      --ink-500:  #8E9494;

      --paper-junto: #F3F1EC;
      --paper-qs:    #F7F7F6;
      --paper-100:   #F0EFEA;
      --paper-200:   #E4E2DC;

      --terracotta-700: #A85638;
      --terracotta-600: #C46A4A;
      --terracotta-500: #D27653;
      --terracotta-100: #F5DACB;
      --terracotta-50:  #FBEEE5;

      --lavender-700: #6E6E78;
      --lavender-600: #8E8E98;
      --lavender-500: #B4B2BC;
      --lavender-200: #DEDDE3;
      --lavender-100: #ECEBEF;

      --pine-700: #1F3A33;
      --pine-500: #2F5A4E;
      --pine-300: #6B8B7F;

      --signal-positive: #2F5A4E;
      --signal-warn:     #C58B2A;
      --signal-negative: #B04A3A;
      --signal-info:     #4A6E78;

      /* Semantic */
      --bg:          var(--paper-junto);
      --bg-elevated: #FFFFFF;
      --bg-inset:    var(--paper-100);
      --surface-card: var(--paper-qs);
      --fg:    var(--ink-900);
      --fg-1:  var(--ink-900);
      --fg-2:  var(--ink-700);
      --fg-3:  var(--ink-500);
      --accent:       var(--terracotta-500);
      --accent-hover: var(--terracotta-600);
      --accent-press: var(--terracotta-700);
      --rule:         rgba(28,43,43,0.12);
      --rule-strong:  rgba(28,43,43,0.28);
      --rule-on-ink:  rgba(243,241,236,0.12);

      /* Type families */
      --font-display: 'Fraunces', 'Georgia', serif;
      --font-lockup:  'Barlow Condensed', 'Helvetica Neue Condensed', sans-serif;
      --font-sans:    'Inter', -apple-system, BlinkMacSystemFont, system-ui, sans-serif;
      --font-mono:    'JetBrains Mono', 'IBM Plex Mono', ui-monospace, monospace;

      /* Type scale */
      --t-body-lg: 18px;
      --t-body:    16px;
      --t-body-sm: 14px;
      --t-caption: 12px;

      /* Spacing */
      --space-1: 4px;  --space-2: 8px;  --space-3: 12px; --space-4: 16px;
      --space-5: 24px; --space-6: 32px; --space-7: 48px; --space-8: 64px;

      /* Radii */
      --radius-xs:   2px;
      --radius-sm:   4px;
      --radius-md:   8px;
      --radius-lg:   14px;
      --radius-xl:   20px;
      --radius-2xl:  28px;
      --radius-pill: 999px;

      /* Shadows */
      --shadow-hairline: 0 0 0 1px var(--rule);
      --shadow-sm:  0 1px 2px rgba(28,43,43,0.06);
      --shadow-md:  0 6px 18px -8px rgba(28,43,43,0.18);
      --shadow-lg:  0 20px 40px -20px rgba(28,43,43,0.25);
      --shadow-inset: inset 0 0 0 1px var(--rule);

      /* Motion */
      --ease-out:    cubic-bezier(0.22,1,0.36,1);
      --ease-in-out: cubic-bezier(0.65,0,0.35,1);
      --dur-fast:    120ms;
      --dur-base:    220ms;
      --dur-slow:    480ms;

      /* App theme vars (overridden by JS/Tweaks) */
      --sidebar-bg:        var(--paper-qs);
      --sidebar-fg:        var(--ink-600);
      --sidebar-active-bg: #FFFFFF;
      --sidebar-active-fg: var(--ink-900);
      --sidebar-accent:    var(--terracotta-500);
      --sidebar-border:    var(--rule);
      --content-bg:        var(--paper-junto);
      --card-bg:           #FFFFFF;
      --card-border:       var(--rule);
    }

    /* ── Reset ─────────────────────────────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      height: 100%;
      font-family: var(--font-sans);
      background: var(--content-bg);
      color: var(--fg-1);
      font-size: 14px;
      line-height: 1.5;
      -webkit-font-smoothing: antialiased;
      text-rendering: optimizeLegibility;
    }

    #root { height: 100vh; display: flex; overflow: hidden; }

    /* ── Form elements ─────────────────────────────────────────────────── */
    input, textarea, select {
      font-family: var(--font-sans);
      font-size: 13px;
      border: 1px solid rgba(28,43,43,0.22);
      border-radius: var(--radius-sm);
      padding: 8px 10px;
      background: var(--bg-elevated);
      color: var(--fg-1);
      outline: none;
      transition: border-color var(--dur-fast) var(--ease-out),
                  box-shadow    var(--dur-fast) var(--ease-out);
    }
    input:focus, textarea:focus, select:focus {
      border-color: var(--terracotta-500);
      box-shadow: 0 0 0 3px var(--terracotta-50);
    }
    input::placeholder, textarea::placeholder { color: var(--fg-3); }
    textarea { resize: vertical; }
    select { cursor: pointer; appearance: auto; }
    button { cursor: pointer; font-family: var(--font-sans); }

    /* ── Scrollbar ─────────────────────────────────────────────────────── */
    ::-webkit-scrollbar { width: 5px; height: 5px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: rgba(28,43,43,0.18); border-radius: 3px; }
    ::-webkit-scrollbar-thumb:hover { background: rgba(28,43,43,0.30); }

    /* ── Selection ─────────────────────────────────────────────────────── */
    ::selection { background: var(--terracotta-100); color: var(--ink-900); }

    /* ── Print ─────────────────────────────────────────────────────────── */
    @media print {
      .sidebar-wrapper { display: none !important; }
    }

    /* ── Mobile responsive ─────────────────────────────────────────────── */
    @media (max-width: 640px) {
      .sidebar-wrapper { display: none !important; }
      .sidebar-wrapper.open { display: flex !important; position: fixed !important; z-index: 50; }
      .hamburger { display: flex !important; }
      .section-label { display: block !important; }
    }

    /* ── Transitions ───────────────────────────────────────────────────── */
    aside { transition: background var(--dur-base) var(--ease-out); }
  </style>
</head>
<body>
  <div id="root"></div>

  <!-- React 18 -->
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js"
          integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L"
          crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js"
          integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm"
          crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js"
          integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y"
          crossorigin="anonymous"></script>

  <!-- Tweaks panel (must load before app) -->
  <script type="text/babel" src="tweaks-panel.jsx"></script>

  <!-- App modules (order matters) -->
  <script type="text/babel" src="expediente-data.jsx"></script>
  <script type="text/babel" src="expediente-ui.jsx"></script>
  <script type="text/babel" src="expediente-views.jsx"></script>
  <script type="text/babel" src="expediente-app.jsx"></script>
</body>
</html>
